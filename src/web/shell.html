<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ET: Legacy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas#canvas {
            display: block;
            background-color: #000;
            /* Let the engine's SDL touch handling receive raw touch events:
               without touch-action:none mobile browsers consume touches for
               scrolling/zooming (and synthesize a 300ms delayed click) instead
               of forwarding them as SDL finger events (see sdl_input.c). */
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-title {
            font-size: 2.5em;
            font-weight: bold;
            color: #c4a000;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(196, 160, 0, 0.3);
        }

        #loading-subtitle {
            font-size: 1.1em;
            color: #888;
            margin-bottom: 40px;
        }

        #progress-container {
            width: 400px;
            max-width: 80%;
            background-color: #2a2a4a;
            border-radius: 8px;
            overflow: hidden;
            height: 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #c4a000, #e0c000);
            border-radius: 8px;
            transition: width 0.3s ease;
        }

        #progress-text {
            margin-top: 15px;
            font-size: 0.9em;
            color: #aaa;
        }

        #status-text {
            margin-top: 8px;
            font-size: 0.8em;
            color: #666;
        }

        #controls-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(26, 26, 46, 0.9);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
            border-top: 1px solid #333;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #controls-bar:hover {
            opacity: 1;
        }

        .control-btn {
            background-color: #2a2a4a;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background-color 0.2s;
        }

        .control-btn:hover {
            background-color: #3a3a5a;
        }

        .control-btn:active {
            background-color: #4a4a6a;
        }

        #controls-info {
            font-size: 0.8em;
            color: #888;
        }

        #error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 46, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        #error-message {
            max-width: 600px;
            padding: 30px;
            background-color: #2a2a4a;
            border-radius: 8px;
            border: 1px solid #c44;
            text-align: center;
        }

        #error-message h2 {
            color: #c44;
            margin-bottom: 15px;
        }

        #error-message p {
            color: #ccc;
            line-height: 1.6;
        }

        /* Console output panel */
        #console-panel {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.85);
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 8px;
            overflow-y: auto;
            display: none;
            z-index: 50;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading-overlay">
        <div id="loading-title">ET: Legacy</div>
        <div id="loading-subtitle">WebAssembly Edition</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="progress-text">Loading...</div>
        <div id="status-text"></div>
        <div id="build-marker" style="margin-top:24px;font-size:12px;color:#6c6c8a;">shell build: 2026-07-03-A</div>
    </div>

    <!-- Error overlay -->
    <div id="error-overlay">
        <div id="error-message">
            <h2>Error</h2>
            <p id="error-text">An error occurred while loading the game.</p>
        </div>
    </div>

    <!-- Game canvas -->
    <div id="canvas-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>

    <!-- Controls bar -->
    <div id="controls-bar">
        <div>
            <button class="control-btn" onclick="requestFullscreen()">Fullscreen</button>
            <button class="control-btn" onclick="requestPointerLock()">Capture Mouse</button>
            <button class="control-btn" onclick="toggleConsole()">Console</button>
        </div>
        <div id="controls-info">
            Click the game to capture mouse | ESC to release | Move mouse to show controls
        </div>
    </div>

    <!-- Console panel -->
    <div id="console-panel"></div>

    <script>
        // --- Firefox resizable-ArrayBuffer / TextDecoder workaround ----------
        // Built with ALLOW_MEMORY_GROWTH, the growable WebAssembly.Memory is
        // backed by a *resizable* ArrayBuffer in browsers such as Firefox.
        // Firefox's TextDecoder.decode() rejects any ArrayBuffer(View) whose
        // backing buffer is resizable/growable and throws:
        //   "TextDecoder.decode: ArrayBufferView branch of (ArrayBufferView or
        //    ArrayBuffer) can't be a resizable ArrayBuffer or ArrayBufferView".
        // Emscripten's UTF8ArrayToString() decodes a subarray of the heap, so
        // the first filesystem syscall (mkdirat -> getStr -> UTF8ToString)
        // aborts startup. Copy such inputs into a plain, fixed-size buffer
        // before decoding so the string helpers work on every browser. This
        // must run before etl.js (injected via the emcc SCRIPT placeholder
        // near the end of this file) loads. NOTE: never spell out that
        // placeholder in comments - emcc substitutes every occurrence with a
        // script tag whose closing tag would truncate this script block.
        (function () {
            if (typeof TextDecoder === 'undefined') return;
            var proto = TextDecoder.prototype;
            var originalDecode = proto.decode;
            proto.decode = function (input, options) {
                if (input && typeof input === 'object') {
                    var buf = (input instanceof ArrayBuffer) ? input : input.buffer;
                    if (buf && (buf.resizable || buf.growable)) {
                        // Copy into a fixed-size buffer. ArrayBuffer and typed
                        // arrays expose slice(); a DataView does not, so fall
                        // back to copying its underlying bytes explicitly.
                        if (typeof input.slice === 'function') {
                            input = input.slice();
                        } else if (input.buffer) {
                            input = new Uint8Array(input.buffer.slice(
                                input.byteOffset,
                                input.byteOffset + input.byteLength));
                        }
                    }
                }
                return originalDecode.call(this, input, options);
            };
        })();

        // --- Web Audio background suspend / autoplay unlock -----------------
        // The engine's audio backend (SDL2 / OpenAL on Emscripten) drives a Web
        // Audio AudioContext. Two browser behaviours need handling from the page
        // that hosts the canvas:
        //   1. Autoplay policy: an AudioContext starts 'suspended' until a user
        //      gesture resumes it, so sound is silent until the first click/key.
        //   2. Background tabs: a hidden tab keeps its AudioContext running, so
        //      the game would keep playing sound while not visible.
        // Patch the AudioContext constructor (before etl.js creates any context)
        // to track every instance, resume them on the first user gesture, and
        // suspend/resume them together with page visibility. All of this is
        // additive and guarded, so it is a no-op when no context ever exists.
        (function () {
            var Ctx = window.AudioContext || window.webkitAudioContext;
            if (typeof Ctx !== 'function') return;

            var contexts = [];
            function track(ctx) {
                if (ctx && contexts.indexOf(ctx) === -1) {
                    contexts.push(ctx);
                }
                return ctx;
            }
            function resumeAll() {
                for (var i = 0; i < contexts.length; i++) {
                    var c = contexts[i];
                    if (c && c.state === 'suspended' && c.resume) {
                        // resume() may reject before the first gesture; ignore.
                        try { c.resume().catch(function () {}); } catch (e) {}
                    }
                }
            }
            function suspendAll() {
                for (var i = 0; i < contexts.length; i++) {
                    var c = contexts[i];
                    if (c && c.state === 'running' && c.suspend) {
                        try { c.suspend().catch(function () {}); } catch (e) {}
                    }
                }
            }

            // Wrap the constructor so every context the engine creates is
            // tracked. Preserve prototype/statics so nothing else breaks.
            function TrackedAudioContext() {
                var ctx = new (Function.prototype.bind.apply(
                    Ctx, [null].concat([].slice.call(arguments))))();
                return track(ctx);
            }
            TrackedAudioContext.prototype = Ctx.prototype;
            window.AudioContext = TrackedAudioContext;
            if (window.webkitAudioContext) {
                window.webkitAudioContext = TrackedAudioContext;
            }

            // Resume on the first user gesture (autoplay unlock). Emscripten
            // also does this for its own contexts, but tracking here covers any
            // context and is harmless if already running.
            var unlockEvents = ['pointerdown', 'keydown', 'touchstart'];
            function unlock() {
                resumeAll();
                for (var i = 0; i < unlockEvents.length; i++) {
                    window.removeEventListener(unlockEvents[i], unlock, true);
                }
            }
            for (var i = 0; i < unlockEvents.length; i++) {
                window.addEventListener(unlockEvents[i], unlock, true);
            }

            // Mute while the tab is hidden; restore when visible again.
            document.addEventListener('visibilitychange', function () {
                if (document.hidden) {
                    suspendAll();
                } else {
                    resumeAll();
                }
            });
        })();

        // Keep the most recent engine log/error lines so a fatal error can be
        // shown on screen. Users may not have the dev console (F12) open, so
        // this is the only way many will ever see the real failure reason.
        var recentLog = [];
        function recordLog(text) {
            if (!text) return;
            recentLog.push(String(text));
            if (recentLog.length > 12) recentLog.shift();
        }

        // Module configuration for Emscripten
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                return canvas;
            })(),

            print: function(text) {
                if (text) {
                    console.log(text);
                    appendConsole(text);
                }
            },

            printErr: function(text) {
                if (text) {
                    console.error(text);
                    recordLog(text);
                    appendConsole('[ERR] ' + text);
                }
            },

            setStatus: function(text) {
                if (!text) return;

                var progressBar = document.getElementById('progress-bar');
                var progressText = document.getElementById('progress-text');
                var statusText = document.getElementById('status-text');
                var loadingOverlay = document.getElementById('loading-overlay');

                if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };

                if (text === Module.setStatus.last.text) return;
                Module.setStatus.last.text = text;

                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                if (m) {
                    var current = parseInt(m[2]);
                    var total = parseInt(m[4]);
                    var percent = (current / total * 100).toFixed(0);
                    progressBar.style.width = percent + '%';
                    progressText.textContent = m[1].trim();
                    statusText.textContent = percent + '% (' + current + '/' + total + ')';
                } else {
                    progressBar.style.width = '100%';
                    progressText.textContent = text;
                    statusText.textContent = '';

                    if (text === '') {
                        // Loading complete
                        if (typeof startupWatchdog !== 'undefined') {
                            clearTimeout(startupWatchdog);
                        }
                        loadingOverlay.classList.add('hidden');
                        setTimeout(function() {
                            loadingOverlay.style.display = 'none';
                        }, 500);
                    }
                }
            },

            onRuntimeInitialized: function() {
                console.log('ET: Legacy WASM runtime initialized');
            },

            onAbort: function(what) {
                showError('The game has aborted: ' + what);
            },

            monitorRunDependencies: function(left) {
                Module.setStatus(left ? 'Preparing... (' + (Module.totalDependencies - left) + '/' + Module.totalDependencies + ')' : '');
            },

            totalDependencies: 0
        };

        Module.setStatus('Downloading...');

        // Error handler
        window.onerror = function(event) {
            Module.setStatus('Error');
            showError('An exception was thrown: ' + event);
        };

        // Startup runs largely inside promises (asset/mod fetch, the ASYNCIFY
        // main loop). A rejected promise does NOT trigger window.onerror, so
        // without this handler an async failure (e.g. a TextDecoder/WebGL/asset
        // error) would leave the loading overlay frozen with no visible reason.
        // Surface it on screen so it is diagnosable instead of a silent hang.
        window.addEventListener('unhandledrejection', function (e) {
            var reason = e && e.reason;
            var msg = (reason && (reason.stack || reason.message)) ||
                String(reason) || 'Unknown error';
            Module.setStatus('Error');
            showError('Startup failed: ' + msg);
        });

        // Watchdog: if the engine has not started (overlay still visible) after
        // a generous delay and nothing has errored, tell the user where it is
        // stuck instead of leaving them staring at a frozen "Loading..." screen.
        var startupWatchdog = setTimeout(function () {
            var overlay = document.getElementById('loading-overlay');
            var errorOverlay = document.getElementById('error-overlay');
            if (overlay && !overlay.classList.contains('hidden') &&
                errorOverlay && errorOverlay.style.display !== 'flex') {
                var where = (Module.setStatus.last && Module.setStatus.last.text) ||
                    'initializing';
                showError('The game is taking unusually long to start ' +
                    '(stuck at: ' + where + ').\n\n' +
                    'Open the browser console (F12) for the exact error. ' +
                    'Common causes:\n' +
                    '\u2022 etl.wasm failed to download (check the ' +
                    'Network tab \u2013 it must load with HTTP 200 and be ' +
                    'served as application/wasm).\n' +
                    '\u2022 The retail paks (pak0-2.pk3) could not be fetched ' +
                    'from the etmain/ folder next to etl.html.\n' +
                    '\u2022 The mod pk3 could not be fetched from the legacy/ ' +
                    'folder next to etl.html.\n' +
                    '\u2022 WebGL is unavailable or disabled in this browser.');
            }
        }, 25000);

        function showError(message) {
            var overlay = document.getElementById('error-overlay');
            var text = document.getElementById('error-text');
            overlay.style.display = 'flex';
            var full = message;
            if (recentLog.length) {
                full += '\n\nLast engine messages:\n' + recentLog.slice(-8).join('\n');
            }
            text.style.whiteSpace = 'pre-wrap';
            text.style.textAlign = 'left';
            text.textContent = full;
        }

        // Fullscreen support
        function requestFullscreen() {
            var canvas = document.getElementById('canvas');
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen();
            } else if (canvas.webkitRequestFullscreen) {
                canvas.webkitRequestFullscreen();
            } else if (canvas.mozRequestFullScreen) {
                canvas.mozRequestFullScreen();
            }
        }

        // Pointer lock support
        function requestPointerLock() {
            var canvas = document.getElementById('canvas');
            canvas.requestPointerLock = canvas.requestPointerLock ||
                                        canvas.mozRequestPointerLock ||
                                        canvas.webkitRequestPointerLock;
            if (canvas.requestPointerLock) {
                canvas.requestPointerLock();
            }
        }

        // Click on canvas to capture mouse
        document.getElementById('canvas').addEventListener('click', function() {
            requestPointerLock();
        });

        // Console panel
        var consoleVisible = false;
        function toggleConsole() {
            consoleVisible = !consoleVisible;
            document.getElementById('console-panel').style.display = consoleVisible ? 'block' : 'none';
        }

        function appendConsole(text) {
            var panel = document.getElementById('console-panel');
            var line = document.createElement('div');
            line.textContent = text;
            panel.appendChild(line);

            // Keep only last 500 lines
            while (panel.children.length > 500) {
                panel.removeChild(panel.firstChild);
            }

            panel.scrollTop = panel.scrollHeight;
        }

        // Resize canvas to fill window
        function resizeCanvas() {
            var canvas = document.getElementById('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Show controls bar when mouse moves to bottom of screen
        document.addEventListener('mousemove', function(e) {
            var controlsBar = document.getElementById('controls-bar');
            if (e.clientY > window.innerHeight - 60) {
                controlsBar.style.opacity = '1';
            }
        });
    </script>

    <!--
        ET: Legacy asset + networking bootstrap
        ----------------------------------------
        A browser build ships no game data and cannot open raw UDP sockets, so
        before the engine starts we:
          1. Download the etmain paks (pak0-2.pk3) into the in-browser
             filesystem (cached in IndexedDB so they are fetched once). By
             default they are loaded same-origin (from an "etmain/" folder next
             to this page) so no CORS configuration is required.
          2. Download the ET: Legacy mod pk3 (game logic cgame/ui + ui menus)
             into the in-browser filesystem from a "legacy/" folder next to this
             page. The engine mounts it and extracts + loads cgame/ui from it.
          3. Optionally point the client at a WebSocket->UDP relay and auto-join
             a server, driven by URL query parameters:
               ?assets=<base-url>   override where the paks are downloaded from.
                                    A cross-origin URL requires the web space to
                                    allow CORS downloads of the paks.
               ?legacy=<base-url>   override where the mod pk3 is downloaded from.
               ?mod=<a.pk3,b.pk3>   override which mod pk3(s) to download.
               ?relay=<ws-url>      WebSocket relay (see tools/ws-relay)
               ?connect=<host:port> game server to join through the relay
        Example:
          etl.html?relay=wss://relay.example.com&connect=203.0.113.10:27960
    -->
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);

            // Where to download the retail etmain data from. Defaults to an
            // "etmain/" folder served next to this page, so the paks are fetched
            // same-origin (no CORS needed), just like the mod side-modules
            // below. Override with ?assets=<url>; a cross-origin URL requires
            // the remote web space to allow CORS downloads of the paks.
            var ASSET_BASE = params.get('assets');
            if (ASSET_BASE) {
                // Normalise a user-supplied override to end in a single slash.
                if (ASSET_BASE.charAt(ASSET_BASE.length - 1) !== '/') {
                    ASSET_BASE += '/';
                }
            } else {
                ASSET_BASE = 'etmain/';
            }

            // True when ASSET_BASE resolves to a different origin than this page,
            // in which case the remote server must send CORS headers.
            function assetsAreCrossOrigin() {
                try {
                    return new URL(ASSET_BASE, window.location.href).origin !==
                        window.location.origin;
                } catch (e) {
                    return false;
                }
            }

            // Retail paks required to run. These are NOT redistributed with
            // ET: Legacy; they are fetched from ASSET_BASE at runtime.
            var PAK_FILES = ['pak0.pk3', 'pak1.pk3', 'pak2.pk3'];

            var INSTALL_DIR = '/etlegacy';       // must match Sys_SetDefaultInstallPath()
            var ETMAIN_DIR = INSTALL_DIR + '/etmain';
            var LEGACY_DIR = INSTALL_DIR + '/legacy';

            // Where to download the ET: Legacy mod data from. This is the mod's
            // "legacy/" folder (analogous to etmain/ for the retail paks) served
            // next to this page by default, so it is fetched same-origin (no CORS
            // needed). Override with ?legacy=<url>.
            var LEGACY_BASE = params.get('legacy');
            if (LEGACY_BASE) {
                if (LEGACY_BASE.charAt(LEGACY_BASE.length - 1) !== '/') {
                    LEGACY_BASE += '/';
                }
            } else {
                LEGACY_BASE = 'legacy/';
            }

            // The ET: Legacy mod pk3. It bundles the game logic side-modules
            // (cgame.mp.wasm32.so / ui.mp.wasm32.so) together with the mod's ui
            // menu files, exactly like the desktop legacy_<version>.pk3. It is
            // downloaded into LEGACY_DIR before main() runs; the engine then
            // mounts it and extracts + dlopen()s cgame/ui from it, just like the
            // native client (see FS_CL_ExtractFromPakFile / Sys_LoadGameDll).
            // The default filename is injected at build time from the project
            // version (cmake/ETLBuildMod.cmake). Override the list with
            // ?mod=<a.pk3,b.pk3>.
            var MOD_PK3 = (function () {
                var m = params.get('mod');
                if (m) {
                    return m.split(',').map(function (s) { return s.trim(); })
                        .filter(function (s) { return s.length; });
                }
                // '@ETL_MOD_PK3_NAME@' is substituted by CMake at build time
                // (configure_file) with the versioned pk3 name, e.g. legacy_2.84.0.pk3.
                return ['@ETL_MOD_PK3_NAME@'];
            })();

            // The game-logic side modules (cgame/ui). On wasm these are loaded
            // through dlopen(), which on Emscripten can only load a module that
            // was run through the wasm *preload plugin* (it compiles the module
            // and caches it in preloadedWasm; the engine's dlopen() then reuses
            // that cached module). A module merely written to the virtual
            // filesystem - fetched with fetch()/FS.writeFile, or extracted from
            // the mod pk3 at runtime by the engine - is inert data the browser
            // refuses to compile synchronously on the main thread, so dlopen()
            // would fail with "VM_Create on ui failed". They are therefore
            // preloaded (fetched + precompiled) below via FS.createPreloadedFile,
            // in addition to the pk3 (which carries the ui .menu files). The raw
            // .so files are served in the same legacy/ folder as the pk3.
            var MOD_FILES = ['cgame.mp.wasm32.so', 'ui.mp.wasm32.so'];

            // Build the engine command line from URL parameters.
            var args = [];
            var relay = params.get('relay');
            if (relay) {
                args.push('+set', 'net_wsRelayServer', relay);
            }
            var connect = params.get('connect');
            if (connect) {
                args.push('+connect', connect);
            }
            Module.arguments = args;

            function statusFor(name, received, total) {
                if (total) {
                    Module.setStatus('Downloading ' + name + ' (' + received + '/' + total + ')');
                } else {
                    Module.setStatus('Downloading ' + name + ' (' + received + '/' + received + ')');
                }
            }

            // Fetch a file with progress reporting and write it to the FS.
            function downloadInto(sourceUrl, target, label) {
                // Skip if it is already present (e.g. restored from IndexedDB).
                try {
                    if (Module.FS.analyzePath(target).exists) {
                        return Promise.resolve();
                    }
                } catch (e) { /* FS not ready yet - fall through and download */ }

                return fetch(sourceUrl).then(function (response) {
                    if (!response.ok) {
                        throw new Error('Failed to download ' + label + ': HTTP ' + response.status);
                    }

                    var total = parseInt(response.headers.get('content-length') || '0', 10);

                    // Prefer streaming so we can report progress; fall back to
                    // arrayBuffer() when the stream reader is unavailable.
                    if (!response.body || !response.body.getReader) {
                        return response.arrayBuffer().then(function (buf) {
                            Module.FS.writeFile(target, new Uint8Array(buf));
                        });
                    }

                    var reader = response.body.getReader();
                    var chunks = [];
                    var received = 0;

                    function pump() {
                        return reader.read().then(function (result) {
                            if (result.done) {
                                var data = new Uint8Array(received);
                                var offset = 0;
                                for (var i = 0; i < chunks.length; i++) {
                                    data.set(chunks[i], offset);
                                    offset += chunks[i].length;
                                }
                                Module.FS.writeFile(target, data);
                                return;
                            }
                            chunks.push(result.value);
                            received += result.value.length;
                            statusFor(label, received, total);
                            return pump();
                        });
                    }

                    return pump();
                });
            }

            function downloadPak(name) {
                return downloadInto(ASSET_BASE + name, ETMAIN_DIR + '/' + name, name);
            }

            // Download one file from the legacy/ folder into LEGACY_DIR.
            function downloadLegacyFile(name) {
                return downloadInto(LEGACY_BASE + name, LEGACY_DIR + '/' + name, name);
            }

            // Preload a game-logic side module (cgame/ui) so the engine's
            // dlopen() can load it. FS.createPreloadedFile fetches the .so and
            // runs it through Emscripten's wasm preload plugin, which compiles
            // the module and caches it in preloadedWasm keyed by its virtual-FS
            // path. The engine looks the module up under fs_basepath
            // (LEGACY_DIR, i.e. /etlegacy/legacy) so dlopen() becomes a cache
            // hit there (see Sys_LoadGameDll / Sys_TryLibraryLoad). Without this
            // precompilation dlopen() cannot instantiate the module at all and
            // startup aborts with "VM_Create on ui failed".
            //
            // The compiled module lives in preloadedWasm (in memory), so it must
            // be re-preloaded on every load; drop any copy persisted in IndexedDB
            // from a previous session first, otherwise createPreloadedFile throws
            // trying to recreate an existing file.
            function preloadSideModule(name) {
                var target = LEGACY_DIR + '/' + name;
                try {
                    if (Module.FS.analyzePath(target).exists) {
                        Module.FS.unlink(target);
                    }
                } catch (e) { /* nothing to remove */ }

                return new Promise(function (resolve, reject) {
                    Module.setStatus('Loading ' + name);
                    try {
                        Module.FS.createPreloadedFile(
                            LEGACY_DIR, name, LEGACY_BASE + name, true, false,
                            function () { resolve(); },
                            function () {
                                reject(new Error('Failed to preload ' + name +
                                    ' from ' + LEGACY_BASE));
                            });
                    } catch (e) {
                        reject(e);
                    }
                });
            }

            // Fetch the mod data. Two things are needed:
            //   1. The legacy pk3 - it carries the ui .menu files and other mod
            //      media. (It also contains the cgame/ui .so, but a side module
            //      cannot be dlopen()ed straight out of the pk3 on wasm, see
            //      preloadSideModule.)
            //   2. The cgame/ui side modules, preloaded (fetched + precompiled)
            //      so the engine's dlopen() succeeds.
            // The pk3 is optional (missing .menu files degrade the UI but do not
            // abort); the side modules are mandatory - if they cannot be
            // preloaded the engine aborts later with "VM_Create on ui failed".
            function downloadModAssets() {
                // 1) mod pk3(s) - non-fatal if absent.
                var pk3Chain = MOD_PK3.reduce(function (chain, name) {
                    return chain.then(function () {
                        return downloadLegacyFile(name).catch(function (err) {
                            if (console && console.warn) {
                                console.warn('Mod pk3 ' + name + ' not fetched from ' +
                                    LEGACY_BASE + ': ' + err.message);
                            }
                        });
                    });
                }, Promise.resolve());

                // 2) cgame/ui side modules - precompiled so dlopen() works.
                return pk3Chain.then(function () {
                    return MOD_FILES.reduce(function (chain, name) {
                        return chain.then(function () {
                            return preloadSideModule(name);
                        });
                    }, Promise.resolve());
                });
            }

            // Persist the etmain data to IndexedDB so subsequent loads are fast.
            function persist() {
                return new Promise(function (resolve) {
                    try {
                        Module.FS.syncfs(false, function () { resolve(); });
                    } catch (e) {
                        resolve();
                    }
                });
            }

            // Mount IndexedDB-backed filesystems for the etmain and legacy
            // directories and load anything cached from a previous session, so
            // the (large) retail paks and mod pk3 are downloaded only once.
            function mountCache() {
                return new Promise(function (resolve) {
                    try {
                        Module.FS.mkdirTree(ETMAIN_DIR);
                        Module.FS.mkdirTree(LEGACY_DIR);
                        Module.FS.mount(Module.FS.filesystems.IDBFS, {}, ETMAIN_DIR);
                        Module.FS.mount(Module.FS.filesystems.IDBFS, {}, LEGACY_DIR);
                        Module.FS.syncfs(true, function () { resolve(); });
                    } catch (e) {
                        // IDBFS unavailable - fall back to a plain in-memory FS.
                        try {
                            Module.FS.mkdirTree(ETMAIN_DIR);
                            Module.FS.mkdirTree(LEGACY_DIR);
                        } catch (e2) { /* ignore */ }
                        resolve();
                    }
                });
            }

            // Run before the engine's main(): block startup until assets exist.
            Module.preRun = Module.preRun || [];
            Module.preRun.push(function () {
                Module.addRunDependency('etl-assets');

                mountCache()
                    .then(function () {
                        // etmain retail paks (same-origin by default, cached in
                        // IndexedDB; may be cross-origin via ?assets=).
                        return PAK_FILES.reduce(function (chain, name) {
                            return chain.then(function () { return downloadPak(name); });
                        }, Promise.resolve());
                    })
                    .then(function () {
                        // ET: Legacy mod data: the legacy pk3 (ui .menu files and
                        // other mod media, cached in IndexedDB) plus the cgame/ui
                        // side modules, which are fetched and precompiled here so
                        // the engine's dlopen() can load them. A side module that
                        // cannot be preloaded rejects and is reported below.
                        return downloadModAssets();
                    })
                    .then(persist)
                    .then(function () {
                        Module.setStatus('Starting ET: Legacy...');
                        Module.removeRunDependency('etl-assets');
                    })
                    .catch(function (err) {
                        var msg;
                        if (err && /preload/i.test(err.message || '')) {
                            // A mandatory cgame/ui side module could not be
                            // fetched/compiled from the legacy/ folder.
                            msg = 'Could not load the ET: Legacy game modules ' +
                                'from ' + LEGACY_BASE + '.\n' + err.message +
                                '\n\nMake sure ' + MOD_FILES.join(', ') +
                                ' are present in the "' +
                                LEGACY_BASE.replace(/\/$/, '') +
                                '" folder next to this page (served with HTTP 200 ' +
                                'and the application/wasm MIME type).';
                            showError(msg);
                            Module.removeRunDependency('etl-assets');
                            return;
                        }
                        // Otherwise a retail pak download failed.
                        msg = 'Could not load game data from ' + ASSET_BASE +
                            '.\n' + err.message;
                        if (assetsAreCrossOrigin()) {
                            msg += '\n\nThe web space must allow cross-origin ' +
                                '(CORS) downloads of the paks, or host ' +
                                'pak0-2.pk3 next to this page.';
                        } else {
                            msg += '\n\nMake sure pak0.pk3, pak1.pk3 and ' +
                                'pak2.pk3 are present in the "' +
                                ASSET_BASE.replace(/\/$/, '') +
                                '" folder next to this page.';
                        }
                        showError(msg);
                        Module.removeRunDependency('etl-assets');
                    });
            });
        })();
    </script>
