// ET: Legacy web (Emscripten) build - preloaded browser defaults.
//
// This file is packed into etl.data by the --preload-file link option (see
// cmake/ETLBuildClient.cmake) and placed at fs_homepath/legacy/autoexec.cfg
// in the browser's virtual filesystem, so Com_Init's "exec autoexec.cfg"
// applies it on every page load before the renderer starts. This mirrors the
// reference Wwasm web port, whose .data file preloads wolfconfig.cfg with the
// same settings (com_recommendedSet 1 + browser-tuned video defaults).

// The browser build cannot vid_restart: a canvas WebGL context and gl4es
// cannot be torn down and re-created within the same page. Skip Com_Init's
// first-run "apply recommended preset + vid_restart" path entirely; the web
// build already ships browser-tuned renderer defaults in code.
seta com_recommendedSet "1"

// Don't queue the intro cinematic on first run; go straight to the menu.
seta com_introplayed "1"

// Windowed fixed-size video, exactly like Wwasm's wolfconfig.cfg. The engine
// also forces these as Emscripten code defaults (sdl_glimp.c GLimp_InitCvars:
// r_fullscreen "0" CVAR_ROM, r_mode "-1", 1366x768), so these setas only
// pin the values against a stale archived etconfig.cfg in the browser's
// persistent storage. SDL fullscreen is never used in the browser; use the
// page's Fullscreen button (browser Fullscreen API) instead.
seta r_mode "-1"
seta r_customwidth "1366"
seta r_customheight "768"
